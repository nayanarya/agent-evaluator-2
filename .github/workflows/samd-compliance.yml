name: SAMD Compliance Enforcement

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  compliance-check:
    name: SAMD Compliance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install Node dependencies
        run: npm install

      - name: Generate Software Classification
        run: |
          mkdir -p compliance-reports
          cat > compliance-reports/software-classification.json << 'EOF'
          {
            "standard": "IEC 62304",
            "safetyClass": "B",
            "deviceType": "AI Agent Evaluation System",
            "riskLevel": "Medium",
            "rationale": "Software provides decision support for AI model evaluation and comparison",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Generate SBOM
        continue-on-error: true
        run: |
          npx @cyclonedx/cyclonedx-npm --output-file sbom-cyclonedx.json || echo "SBOM generation skipped"

      - name: Run npm audit
        continue-on-error: true
        run: |
          npm audit --json > npm-audit-report.json || true
          npm audit || true

      - name: Run Risk Analysis
        run: python scripts/risk_analyzer.py

      - name: Verify Risk Mitigations
        run: python scripts/verify_risk_mitigations.py

      - name: Verify Traceability
        run: python scripts/verify_traceability.py

      - name: Validate Documentation
        run: python scripts/validate_documentation.py

      - name: Generate Traceability Matrix
        run: python scripts/generate_traceability_matrix.py

      - name: Generate Compliance Dashboard
        run: python scripts/generate_compliance_dashboard.py

      - name: Compliance Gate Check
        run: python scripts/compliance_gate.py --min-score 80

      - name: Upload Compliance Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-reports
          path: compliance-reports/
          retention-days: 90
          if-no-files-found: warn

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: sbom-*.json
          retention-days: 90
          if-no-files-found: warn

      - name: Upload Audit Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: npm-audit-report.json
          retention-days: 90
          if-no-files-found: warn

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dashboardPath = 'compliance-reports/compliance-dashboard.json';
            
            let comment = '## 🏥 SAMD Compliance Report\n\n';
            
            if (fs.existsSync(dashboardPath)) {
              const dashboard = JSON.parse(fs.readFileSync(dashboardPath, 'utf8'));
              const score = dashboard.overallCompliance;
              const level = dashboard.complianceLevel;
              
              const emoji = score >= 85 ? '✅' : score >= 70 ? '⚠️' : '❌';
              
              comment += `${emoji} **Overall Compliance: ${score}%** (${level})\n\n`;
              comment += '### Summary\n';
              comment += `- Risk Management: ${dashboard.sections.riskManagement.overallRiskLevel}\n`;
              comment += `- Traceability: ${dashboard.sections.traceability.traceabilityPercentage}%\n`;
              comment += `- Documentation: ${dashboard.sections.documentation.completeness}%\n\n`;
              comment += '📊 View detailed reports in workflow artifacts.\n';
            } else {
              comment += '✅ Compliance checks completed.\n\n';
              comment += '📊 View detailed reports in workflow artifacts.\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
